apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-datadog-config
  namespace: iq-ha
  labels:
    app.kubernetes.io/name: fluent-bit-datadog
    app.kubernetes.io/component: log-aggregator
data:
  fluent-bit.conf: |
    [SERVICE]
      Flush         5
      Log_Level     info
      Daemon        off
      Parsers_File  parsers.conf
      # Liveness/readiness probes hit /api/v1/health on this port.
      HTTP_Server   On
      HTTP_Listen   0.0.0.0
      HTTP_Port     2020

    # ─── INPUTS ──────────────────────────────────────────────────────────
    # IQ Server emits five distinct log files. We tail each pattern through
    # a parser that matches that format so records are structured (one JSON
    # object per event) before they are forwarded to Datadog.

    # Server application log: Logback appender, plain-text format.
    # The `iq_java_logback` multiline parser joins stack traces into one record.
    [INPUT]
      Name              tail
      Path              /logs/log/*-clm-server.log
      Parser            nexus_iq_server
      multiline.parser  iq_java_logback
      Tag               iq_server.clm-server
      DB                /logs/log/.fluent-bit-datadog-clm-server.db
      Mem_Buf_Limit     50MB
      Skip_Long_Lines   On
      Read_From_Head    true
      Refresh_Interval  10

    # Request log: Jetty access log, plain-text format.
    [INPUT]
      Name              tail
      Path              /logs/log/*-request.log
      Parser            nexus_iq_request
      Tag               iq_server.request
      DB                /logs/log/.fluent-bit-datadog-request.db
      Mem_Buf_Limit     50MB
      Skip_Long_Lines   On
      Read_From_Head    true
      Refresh_Interval  10

    # Audit log: native JSON. Buffer sized for large `data` payloads.
    [INPUT]
      Name               tail
      Path               /logs/log/*-audit.log
      Parser             nexus_iq_audit
      Tag                iq_server.audit
      DB                 /logs/log/.fluent-bit-datadog-audit.db
      Buffer_Chunk_Size  256k
      Buffer_Max_Size    1M
      Mem_Buf_Limit      50MB
      Skip_Long_Lines    On
      Read_From_Head     true
      Refresh_Interval   10

    # Policy-violation log: native JSON.
    [INPUT]
      Name               tail
      Path               /logs/log/*-policy-violation.log
      Parser             nexus_iq_policy_violation
      Tag                iq_server.policy-violation
      DB                 /logs/log/.fluent-bit-datadog-policy-violation.db
      Buffer_Chunk_Size  256k
      Buffer_Max_Size    1M
      Mem_Buf_Limit      50MB
      Skip_Long_Lines    On
      Read_From_Head     true
      Refresh_Interval   10

    # Stderr: raw JVM stderr. No parser, lines forwarded as-is.
    [INPUT]
      Name              tail
      Path              /logs/log/*-stderr.log
      Tag               iq_server.stderr
      DB                /logs/log/.fluent-bit-datadog-stderr.db
      Mem_Buf_Limit     50MB
      Skip_Long_Lines   On
      Read_From_Head    true
      Refresh_Interval  10

    # ─── FILTER ──────────────────────────────────────────────────────────
    # Re-parse the multiline-joined `log` field into structured fields
    # (time, level, thread, user, logger, message). Fluent Bit's tail
    # `Parser` directive is bypassed when `multiline.parser` is set, so we
    # re-run the regex parser here instead. Only applies to the server log.
    [FILTER]
      Name          parser
      Match         iq_server.clm-server
      Key_Name      log
      Parser        nexus_iq_server
      Reserve_Data  On
      Preserve_Key  Off

    # ─── FILE OUTPUTS (PVC AGGREGATION) ──────────────────────────────────
    # Same as the Fluent Bit example — keeps a local aggregated copy on the
    # shared PVC. Useful for offline triage and as a fallback if the Datadog
    # API key is wrong.
    [OUTPUT]
      Name              file
      Match             iq_server.clm-server
      Path              /logs/log
      File              clm-server.aggregated.log
      Format            plain

    [OUTPUT]
      Name              file
      Match             iq_server.request
      Path              /logs/log
      File              request.aggregated.log
      Format            plain

    [OUTPUT]
      Name              file
      Match             iq_server.audit
      Path              /logs/log
      File              audit.aggregated.log
      Format            plain

    [OUTPUT]
      Name              file
      Match             iq_server.policy-violation
      Path              /logs/log
      File              policy-violation.aggregated.log
      Format            plain

    [OUTPUT]
      Name              file
      Match             iq_server.stderr
      Path              /logs/log
      File              stderr.aggregated.log
      Format            plain

    # ─── DATADOG OUTPUTS ─────────────────────────────────────────────────
    # Each log type ships to Datadog's HTTP intake with a distinct
    # `dd_source`. Datadog's auto-pipeline matching keys on `source`, so
    # JSON records (audit, policy-violation) get facets extracted natively.
    #
    # `Host` defaults to the US5 region. Customers on other sites must
    # change all 5 outputs to match — see the README's site/region table.
    # `apikey` is loaded from the DD_API_KEY env var (k8s secret `datadog-api-key`).

    [OUTPUT]
      Name        datadog
      Match       iq_server.clm-server
      Host        http-intake.logs.us5.datadoghq.com
      TLS         on
      compress    gzip
      apikey      ${DD_API_KEY}
      dd_service  iq-server
      dd_source   nexus_iq_server
      dd_tags     env:production

    [OUTPUT]
      Name        datadog
      Match       iq_server.request
      Host        http-intake.logs.us5.datadoghq.com
      TLS         on
      compress    gzip
      apikey      ${DD_API_KEY}
      dd_service  iq-server
      dd_source   nexus_iq_request
      dd_tags     env:production

    [OUTPUT]
      Name        datadog
      Match       iq_server.audit
      Host        http-intake.logs.us5.datadoghq.com
      TLS         on
      compress    gzip
      apikey      ${DD_API_KEY}
      dd_service  iq-server
      dd_source   nexus_iq_audit
      dd_tags     env:production

    [OUTPUT]
      Name        datadog
      Match       iq_server.policy-violation
      Host        http-intake.logs.us5.datadoghq.com
      TLS         on
      compress    gzip
      apikey      ${DD_API_KEY}
      dd_service  iq-server
      dd_source   nexus_iq_policy_violation
      dd_tags     env:production

    [OUTPUT]
      Name        datadog
      Match       iq_server.stderr
      Host        http-intake.logs.us5.datadoghq.com
      TLS         on
      compress    gzip
      apikey      ${DD_API_KEY}
      dd_service  iq-server
      dd_source   nexus_iq_stderr
      dd_tags     env:production

  parsers.conf: |
    # Custom multiline parser for IQ Server clm-server.log.
    # The built-in `java` parser expects a period-millis timestamp
    # (`HH:mm:ss.SSS`), but the chart's default Logback layout emits
    # comma-millis (`HH:mm:ss,SSSZ`). Without a matching start_state regex,
    # every line of a stack trace would be shipped as its own record.
    # This parser handles the comma-millis format and recognizes the bare
    # exception line that IQ Server logs on the line after the leading
    # log message.
    [MULTILINE_PARSER]
      Name           iq_java_logback
      Type           regex
      Flush_Timeout  1000
      Rule           "start_state"  "/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3}[+-]\d{4}\s/"  "cont"
      Rule           "cont"         "/^\s+(?:at\s|\.\.\.\s+\d+\s+more)/"  "cont"
      Rule           "cont"         "/^(?:Caused\s+by|Suppressed):\s/"  "cont"
      Rule           "cont"         "/^[a-zA-Z][\w$]*(?:\.[\w$]+)+:?\s/"  "cont"
      Rule           "cont"         "/^\s*$/"  "cont"

    # IQ Server application log (clm-server.log).
    # Default chart logFormat:
    #   %d{'yyyy-MM-dd HH:mm:ss,SSSZ'} %level [%thread] %X{username} %logger - %msg%n
    # `(?<message>[\s\S]*)` (instead of `.*$`) lets the message capture
    # span newlines so multiline-joined stack traces flow into the message
    # field intact when this parser is used by the [FILTER] stage.
    [PARSER]
      Name        nexus_iq_server
      Format      regex
      Regex       ^(?<time>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3}[+-]\d{4}) (?<level>\w+) \[(?<thread>[^\]]+)\] (?:(?<user>\S+) )?\s*(?<logger>\S+) - (?<message>[\s\S]*)
      Time_Key    time
      Time_Format %Y-%m-%d %H:%M:%S,%L%z
      Time_Keep   On

    # IQ Server access log (request.log).
    # Default chart logFormat:
    #   %clientHost %l %user [%date] "%requestURL" %statusCode %bytesSent %elapsedTime "%header{User-Agent}"
    [PARSER]
      Name        nexus_iq_request
      Format      regex
      Regex       ^(?<client_host>\S+) (?<ident>\S+) (?<user>\S+) \[(?<time>[^\]]+)\] "(?<request_url>[^"]*)" (?<status_code>\d+) (?<bytes_sent>\d+) (?<elapsed_ms>\d+) "(?<user_agent>[^"]*)"$
      Time_Key    time
      Time_Format %d/%b/%Y:%H:%M:%S %z
      Time_Keep   On

    # IQ Server audit log (audit.log) — native JSON.
    [PARSER]
      Name        nexus_iq_audit
      Format      json
      Time_Key    timestamp
      Time_Format %Y-%m-%dT%H:%M:%S.%LZ
      Time_Keep   On

    # IQ Server policy-violation log (policy-violation.log) — native JSON.
    # Time field is `eventTimestamp` (not `timestamp`).
    [PARSER]
      Name        nexus_iq_policy_violation
      Format      json
      Time_Key    eventTimestamp
      Time_Format %Y-%m-%dT%H:%M:%S.%LZ
      Time_Keep   On
