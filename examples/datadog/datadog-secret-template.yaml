# Template for the Datadog API key secret used by the Fluent Bit Deployment.
#
# DO NOT COMMIT a real API key. Either:
#   1. Edit this file in place, replace REPLACE_ME, and `kubectl apply -f`
#      on a copy that is in your .gitignore, OR
#   2. Use the imperative form (recommended for shared repos):
#      kubectl create secret generic datadog-api-key \
#        --from-literal=api-key=<YOUR_KEY> \
#        -n iq-ha
#
# The Deployment expects the secret to be named `datadog-api-key` with key
# `api-key`. If you change either name, update the `secretKeyRef` in
# fluent-bit-deployment.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: datadog-api-key
  namespace: iq-ha
  labels:
    app.kubernetes.io/name: fluent-bit-datadog
    app.kubernetes.io/component: log-aggregator
type: Opaque
stringData:
  api-key: REPLACE_ME
