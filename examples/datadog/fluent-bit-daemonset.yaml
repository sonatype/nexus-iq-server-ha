apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit-datadog
  namespace: iq-ha
  labels:
    app.kubernetes.io/name: fluent-bit-datadog
    app.kubernetes.io/component: log-aggregator
    app.kubernetes.io/part-of: nexus-iq-server
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: fluent-bit-datadog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fluent-bit-datadog
        app.kubernetes.io/component: log-aggregator
    spec:
      serviceAccountName: fluent-bit-datadog
      tolerations:
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
          operator: Exists
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
          operator: Exists
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:3.1.0
          imagePullPolicy: IfNotPresent
          env:
            # The configmap references ${DD_API_KEY} on the `apikey` line of
            # every datadog output. The k8s secret named `datadog-api-key`
            # must exist in this namespace before the pod starts — see
            # datadog-secret-template.yaml and the README.
            - name: DD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: datadog-api-key
                  key: api-key
          ports:
            - containerPort: 2020
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            # Mount the IQ Server PVC. Files at <pvc-root>/log/* are visible
            # at /logs/log/*, matching the tail paths in the configmap.
            - name: iq-server-logs
              mountPath: /logs
              readOnly: false
            - name: fluent-bit-config
              mountPath: /fluent-bit/etc/
      volumes:
        - name: iq-server-logs
          persistentVolumeClaim:
            claimName: iq-server-pvc
        - name: fluent-bit-config
          configMap:
            name: fluent-bit-datadog-config
            items:
              - key: fluent-bit.conf
                path: fluent-bit.conf
              - key: parsers.conf
                path: parsers.conf
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit-datadog
  namespace: iq-ha
  labels:
    app.kubernetes.io/name: fluent-bit-datadog
    app.kubernetes.io/component: log-aggregator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluent-bit-datadog-read
  labels:
    app.kubernetes.io/name: fluent-bit-datadog
rules:
  - apiGroups: [""]
    resources:
      - pods
      - namespaces
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-bit-datadog-read
  labels:
    app.kubernetes.io/name: fluent-bit-datadog
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluent-bit-datadog-read
subjects:
  - kind: ServiceAccount
    name: fluent-bit-datadog
    namespace: iq-ha
