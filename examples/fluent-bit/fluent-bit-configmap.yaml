apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: iq-ha
  labels:
    app.kubernetes.io/name: fluent-bit
data:
  fluent-bit.conf: |
    [SERVICE]
      Flush         5
      Log_Level     info
      Daemon        off
      Parsers_File  parsers.conf

    # Tail all IQ Server log files from the shared volume
    [INPUT]
      Name              tail
      Path              /logs/log/*-clm-server.log
      Parser            nexus_iq
      Tag               iq_server.clm-server
      Mem_Buf_Limit     50MB
      Skip_Long_Lines   On
      Read_From_Head    true
      Refresh_Interval  10

    [INPUT]
      Name              tail
      Path              /logs/log/*-request.log
      Parser            nexus_iq
      Tag               iq_server.request
      Mem_Buf_Limit     50MB
      Skip_Long_Lines   On
      Read_From_Head    true
      Refresh_Interval  10

    [INPUT]
      Name              tail
      Path              /logs/log/*-audit.log
      Parser            nexus_iq
      Tag               iq_server.audit
      Mem_Buf_Limit     50MB
      Skip_Long_Lines   On
      Read_From_Head    true
      Refresh_Interval  10

    [INPUT]
      Name              tail
      Path              /logs/log/*-policy-violation.log
      Parser            nexus_iq
      Tag               iq_server.policy-violation
      Mem_Buf_Limit     50MB
      Skip_Long_Lines   On
      Read_From_Head    true
      Refresh_Interval  10

    [INPUT]
      Name              tail
      Path              /logs/log/*-stderr.log
      Parser            nexus_iq
      Tag               iq_server.stderr
      Mem_Buf_Limit     50MB
      Skip_Long_Lines   On
      Read_From_Head    true
      Refresh_Interval  10

    # Output aggregated logs back to the shared volume
    [OUTPUT]
      Name              file
      Match             iq_server.clm-server
      Path              /logs/log
      File              clm-server.aggregated.log
      Format            plain

    [OUTPUT]
      Name              file
      Match             iq_server.request
      Path              /logs/log
      File              request.aggregated.log
      Format            plain

    [OUTPUT]
      Name              file
      Match             iq_server.audit
      Path              /logs/log
      File              audit.aggregated.log
      Format            plain

    [OUTPUT]
      Name              file
      Match             iq_server.policy-violation
      Path              /logs/log
      File              policy-violation.aggregated.log
      Format            plain

    [OUTPUT]
      Name              file
      Match             iq_server.stderr
      Path              /logs/log
      File              stderr.aggregated.log
      Format            plain

  parsers.conf: |
    [PARSER]
      Name        nexus_iq
      Format      regex
      Regex       ^(?<time>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3}[+-]\d{4}) (?<level>\w+) \[(?<thread>[^\]]+)\] (?<user>\S+) (?<logger>\S+) - (?<message>.*)$
      Time_Key    time
      Time_Format %Y-%m-%d %H:%M:%S,%L%z
      Time_Keep   On
