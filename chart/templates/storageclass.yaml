{{- if .Values.iq_server.persistence.storageClass.create }}
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.iq_server.persistence.storageClass.name | default (printf "%s-storageclass" .Release.Name) }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
provisioner: {{ required "iq_server.persistence.storageClass.provisioner is required when storageClass.create is true" .Values.iq_server.persistence.storageClass.provisioner }}
reclaimPolicy: {{ .Values.iq_server.persistence.storageClass.reclaimPolicy }}
volumeBindingMode: {{ .Values.iq_server.persistence.storageClass.volumeBindingMode }}
allowVolumeExpansion: {{ .Values.iq_server.persistence.storageClass.allowVolumeExpansion }}
{{- with .Values.iq_server.persistence.storageClass.mountOptions }}
mountOptions:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- with .Values.iq_server.persistence.storageClass.parameters }}
parameters:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}
